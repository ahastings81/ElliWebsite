<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're on the Elli list</title>
  <link rel="icon" type="image/x-icon" href="elli_matrix_green.ico" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(87, 255, 132, 0.12), transparent 32%),
        radial-gradient(circle at top right, rgba(29, 209, 90, 0.16), transparent 28%),
        linear-gradient(180deg, #010402 0%, #030806 50%, #05110a 100%);
      color: #f2fff6;
      font-family: Inter, Arial, Helvetica, sans-serif;
      text-align: center;
      padding: 2rem;
    }

    .card {
      max-width: 720px;
      padding: 2rem;
      border-radius: 24px;
      border: 1px solid rgba(87, 255, 132, 0.4);
      background: rgba(12, 32, 18, 0.92);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35), 0 0 25px rgba(87,255,132,0.12);
    }

    h1 {
      margin: 0 0 0.75rem;
      color: #5bff8f;
      font-size: clamp(2rem, 5vw, 3rem);
    }

    p {
      margin: 0.5rem 0;
      color: #c9f5d5;
      font-size: 1.05rem;
    }

    a {
      display: inline-block;
      margin-top: 1.25rem;
      padding: 0.85rem 1.2rem;
      border-radius: 14px;
      border: 1px solid rgba(87, 255, 132, 0.55);
      background: rgba(12, 24, 35, 0.66);
      color: #f2fff6;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.18s ease;
    }

    a:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>You’re on the Elli Early Access List</h1>
    <p>Thanks for following the build.</p>
    <p>You’ll hear from me when the next demo drops.</p>
    <a href="/">Back to Elli</a>
  </div>
</body>
</html>
